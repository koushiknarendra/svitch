name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python PII Detector
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic
        working-directory: pii-shield/service

      - name: Run tests
        run: python test_detectors.py
        working-directory: pii-shield/service

  node-build:
    name: Node.js SDK Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install
        working-directory: sdk/node

      - name: Build
        run: npm run build
        working-directory: sdk/node

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t svitch-pii-shield ./pii-shield/service

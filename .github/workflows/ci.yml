name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-pii-shield:
    name: PII Shield tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r pii-shield/service/requirements.txt
      - name: Run tests
        run: python pii-shield/service/test_detectors.py

  test-agent-tracer:
    name: Agent Tracer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: python agent-tracer/tests/test_tracer.py

  test-sdk-node:
    name: Node.js SDK build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: sdk/node
      - run: npm run build
        working-directory: sdk/node

  test-sdk-python:
    name: Python SDK build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: sdk/python

  test-consent-ledger:
    name: Consent Ledger tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run consent ledger tests
        run: python consent-ledger/tests/test_ledger.py

  test-compliance:
    name: Compliance Engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install fastapi uvicorn
      - name: Run compliance engine tests
        run: python compliance-engine/test_reports.py

  test-enclave:
    name: Private Enclave tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install fastapi uvicorn httpx
      - name: Run enclave integration tests
        run: python private-enclave/test_enclave.py
